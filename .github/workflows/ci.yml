name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build root package
        run: swift build -c debug

      - name: Run unit tests
        run: swift test --parallel

      - name: Build DemoApp fixture
        working-directory: Fixtures/DemoApp
        run: swift build -c debug

      # Integration tests that drive the UI need Accessibility permission,
      # which isn't available on GitHub runners. They are gated behind the
      # PRY_INTEGRATION env var so local runs can still execute them.
      # On CI we verify build + unit tests only.
      - name: Verify pry-mcp CLI boots
        run: |
          .build/debug/pry-mcp version
          .build/debug/pry-mcp help 2>&1 | head -20 || true

  release-artifacts:
    name: Package release artifacts
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build release binary
        run: swift build -c release --product pry-mcp
      - name: Package
        run: |
          mkdir -p dist
          cp .build/release/pry-mcp dist/pry-mcp
          tar -czf dist/pry-mcp-${GITHUB_REF_NAME}-arm64.tar.gz -C dist pry-mcp
          shasum -a 256 dist/pry-mcp-${GITHUB_REF_NAME}-arm64.tar.gz > dist/SHA256SUMS
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pry-mcp-release-${{ github.ref_name }}
          path: dist/
