name: CI

on:
  # Run on every push to main, every PR, and every tag push starting with v.
  # The release-artifacts job is gated below so it only runs on tag/release.
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  release:
    types: [published]

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build root package
        run: swift build -c debug

      - name: Run unit tests
        run: swift test --parallel

      - name: Build DemoApp fixture
        working-directory: Fixtures/DemoApp
        run: swift build -c debug

      - name: Lint specs
        run: .build/debug/pry-mcp lint --dir Fixtures/DemoApp/flows

      # Integration tests need Accessibility permission, which isn't available
      # on GitHub runners. Gated by PRY_INTEGRATION env var locally; CI does
      # build + unit tests + lint only.
      - name: Verify pry-mcp CLI boots
        run: |
          .build/debug/pry-mcp version
          .build/debug/pry-mcp help 2>&1 | head -20 || true

  release-artifacts:
    name: Package release artifacts
    runs-on: macos-14
    needs: build-and-test
    # Run when:
    #   - a tag matching v* is pushed (push event with refs/tags/v...)
    #   - a release is published via the GitHub UI
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release binary
        run: swift build -c release --product pry-mcp

      # Codesign + notarize when secrets are configured. The check moves into
      # the step's bash because GitHub Actions `if:` expressions can't read
      # `secrets.*` directly — we'd need to bind via env at this scope, and
      # then a missing-secret yields an empty string we can guard on.
      - name: Build & sign artifact
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${DEVELOPER_ID_APPLICATION:-}" ]; then
            echo "::notice::DEVELOPER_ID_APPLICATION present — running codesign + notarize."
            chmod +x scripts/release.sh
            ./scripts/release.sh "${GITHUB_REF_NAME}"
          else
            echo "::notice::DEVELOPER_ID_APPLICATION not set — producing unsigned tarball."
            mkdir -p dist
            cp .build/release/pry-mcp dist/pry-mcp
            chmod +x dist/pry-mcp
            tar -czf "dist/pry-mcp-${GITHUB_REF_NAME}-arm64.tar.gz" -C dist pry-mcp
            shasum -a 256 "dist/pry-mcp-${GITHUB_REF_NAME}-arm64.tar.gz" > dist/SHA256SUMS
          fi
          ls -lh dist/

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pry-mcp-${{ github.ref_name }}-arm64.tar.gz
            dist/SHA256SUMS

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: pry-mcp-release-${{ github.ref_name }}
          path: dist/

  homebrew-tap:
    name: Bump Homebrew tap
    runs-on: ubuntu-latest
    needs: release-artifacts
    # Only on release-published; on tag-only push, no GH release exists yet,
    # so the formula's url would 404 until the release is created.
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Update formula in tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping tap bump."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pry-mcp-${GITHUB_REF_NAME}-arm64.tar.gz"

          # Fetch the published asset to compute the canonical sha256.
          curl -fsSL --retry 4 --retry-delay 5 "$ASSET_URL" -o /tmp/pry.tgz
          SHA=$(shasum -a 256 /tmp/pry.tgz | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/NeimadWorks/homebrew-tap" tap
          cd tap

          # Substitute version + url + sha into the formula.
          sed -i.bak \
            -e "s|version \".*\"|version \"$VERSION\"|" \
            -e "s|url \".*\"|url \"$ASSET_URL\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            Formula/pry-mcp.rb
          rm -f Formula/pry-mcp.rb.bak

          git config user.name  "pry-bot"
          git config user.email "pry-bot@users.noreply.github.com"
          git add Formula/pry-mcp.rb
          git commit -m "pry-mcp ${GITHUB_REF_NAME}"
          git push
